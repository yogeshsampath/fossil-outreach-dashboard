  .brand .s{color:var(--muted);font-size:12.5px;margin-top:2px}

  .dot.warn{background:var(--warn)}
  .dot.bad{background:var(--bad)}

<script>
/* ===== SAME STORAGE (CONNECTED TO YOUR OTHER PAGES) ===== */
const ROOT = "fossil_weekly_v2";
function weekKey(year, week){ return `${ROOT}::${year}::${week}`; }
function loadAll(){ try { return JSON.parse(localStorage.getItem(ROOT) || "{}"); } catch { return {}; } }
function getWeekData(year, week){ return loadAll()[weekKey(year,week)] || null; }

/* ===== HELPERS ===== */
function fmt1(n){ return (Number(n)||0).toFixed(1); }
function fmtInt(n){ return String(Math.round(Number(n)||0)); }
function pct(a,b){ return b ? (a/b)*100 : 0; }
function cleanName(s){ return String(s || "").trim().replace(/\s+/g, " "); }
function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

/* ===== DOM ===== */
const inYear = document.getElementById("inYear");
const inWeek = document.getElementById("inWeek");
const inSubject = document.getElementById("inSubject");
const inSign = document.getElementById("inSign");

const uiGoal = document.getElementById("uiGoal");
const uiStatus = document.getElementById("uiStatus");
const uiStatusDot = document.getElementById("uiStatusDot");
const wkMeta = document.getElementById("wkMeta");

const sTraffic = document.getElementById("sTraffic");
const sOutreach = document.getElementById("sOutreach");
const sPct = document.getElementById("sPct");
const sResp = document.getElementById("sResp");

const statusBox = document.getElementById("statusBox");
const statusTitle = document.getElementById("statusTitle");
const statusSub = document.getElementById("statusSub");

const outEmail = document.getElementById("outEmail");
const btnGenerate = document.getElementById("btnGenerate");
const btnCopy = document.getElementById("btnCopy");
const btnRefresh = document.getElementById("btnRefresh");
function buildYearWeek(){
  const nowY = new Date().getFullYear();
  const years = [nowY-1, nowY, nowY+1, nowY+2];
  inYear.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join("");
  const weeks = Array.from({length:60}, (_,i)=>i+1);
  inWeek.innerHTML = weeks.map(w=>`<option value="${w}">${w}</option>`).join("");
}

function getWeekMetrics(year, week){
  const data = getWeekData(year, week) || {};
  const nums = data.numbers || [];

  const traffic = nums.reduce((s,n)=>s+(Number(n.traffic)||0),0);
  const outreach = nums.reduce((s,n)=>s+(Number(n.outreach)||0),0);
  const responses = nums.reduce((s,n)=>s+(Number(n.resp)||0),0);
  const outreachPct = pct(outreach, traffic);
  const goal = Number(data.goal ?? 6.4) || 6.4;

  const top1 = cleanName(data.top1 || "");
  const top2 = cleanName(data.top2 || "");
  const top3 = cleanName(data.top3 || "");

  return {
    data,
    traffic,
    outreach,
    responses,
    outreachPct,
    goal,
    top1,
    top2,
    top3
  };
}

function classifyResult(outreachPct, goal){
  if(outreachPct >= goal + 2) return "good";
  if(outreachPct >= goal - 1) return "ok";
  return "bad";
}

function getTopText(top1, top2, top3){
  const arr = [top1, top2, top3].filter(Boolean);
  if(arr.length === 0) return "the team";
  if(arr.length === 1) return arr[0];
  if(arr.length === 2) return `${arr[0]} and ${arr[1]}`;
  return `${arr[0]}, ${arr[1]}, and ${arr[2]}`;
}

function renderSummary(){
  const year = Number(inYear.value);
  const week = Number(inWeek.value);
  const m = getWeekMetrics(year, week);
  const result = classifyResult(m.outreachPct, m.goal);

  wkMeta.textContent = `Week ${week} • ${year}`;
  uiGoal.textContent = `${fmt1(m.goal)}%`;

  sTraffic.textContent = fmtInt(m.traffic);
  sOutreach.textContent = fmtInt(m.outreach);
  sPct.textContent = `${fmt1(m.outreachPct)}%`;
  sResp.textContent = fmtInt(m.responses);

  statusBox.classList.remove("good","warn","bad");

  if(result === "good"){
    uiStatus.textContent = "Good";
    uiStatusDot.className = "dot good";
    statusBox.classList.add("good");
    statusTitle.textContent = "Strong Week";
    statusSub.textContent = "Outreach is clearly above goal. Email tone should be appreciative, confident, and momentum-focused.";
  } else if(result === "ok"){
    uiStatus.textContent = "OK";
    uiStatusDot.className = "dot warn";
    statusBox.classList.add("warn");
    statusTitle.textContent = "Stable / Near Goal";
    statusSub.textContent = "Performance is close to target. Email tone should be balanced, encouraging, professional, and improvement-focused.";
  } else {
    uiStatus.textContent = "Needs Push";
    uiStatusDot.className = "dot bad";
    statusBox.classList.add("bad");
    statusTitle.textContent = "Below Goal";
    statusSub.textContent = "Outreach is below expectation. Email tone should stay professional, motivating, and accountability-focused without sounding negative.";
  }

  if(!inSubject.value.trim()){
    inSubject.value = `Week ${week} Outreach Update`;
  }
  if(!inSign.value.trim()){
    inSign.value = "Thank you all — let’s carry this forward into next week.";
  }
}

function generateEmail(){
  const year = Number(inYear.value);
  const week = Number(inWeek.value);
  const m = getWeekMetrics(year, week);

  const result = classifyResult(m.outreachPct, m.goal);
  const topText = getTopText(m.top1, m.top2, m.top3);

  const ctx = {
    year,
    week,
    traffic: fmtInt(m.traffic),
    outreach: fmtInt(m.outreach),
    responses: fmtInt(m.responses),
    outreachPct: fmt1(m.outreachPct),
    goal: fmt1(m.goal),
    topText,
    sign: (inSign.value || "").trim() || "Thank you all — let’s carry this forward into next week."
  };

  let body = "";
  if(result === "good") body = pick(goodTemplates(ctx));
  else if(result === "ok") body = pick(okTemplates(ctx));
  else body = pick(badTemplates(ctx));

  const subject = (inSubject.value || `Week ${week} Outreach Update`).trim();
  outEmail.value = `Subject: ${subject}

${body}`;
}

function refreshAll(){
  renderSummary();
  generateEmail();
}

btnGenerate.addEventListener("click", generateEmail);
btnRefresh.addEventListener("click", refreshAll);

btnCopy.addEventListener("click", async ()=>{
  try{
    await navigator.clipboard.writeText(outEmail.value || "");
    const old = btnCopy.textContent;
    btnCopy.textContent = "Copied ✓";
    setTimeout(()=> btnCopy.textContent = old, 900);
  }catch{
    alert("Copy failed. Please copy manually.");
  }
});

inYear.addEventListener("change", refreshAll);
inWeek.addEventListener("change", refreshAll);
inSubject.addEventListener("input", generateEmail);
inSign.addEventListener("input", generateEmail);
window.addEventListener("focus", refreshAll);

function init(){
  buildYearWeek();
  const now = new Date();
  inYear.value = String(now.getFullYear());
  inWeek.value = "4";
  inSubject.value = `Week 4 Outreach Update`;
  inSign.value = "Thank you all — let’s carry this forward into next week.";
  refreshAll();
}
document.addEventListener("DOMContentLoaded", init);
</script>
