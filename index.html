<head>
<meta charset="utf-8" />

<title>Fossil 5976 — Luxury Watch Dial</title>

<style>
  :root{
    --text:#f5f1ea;
    --muted:#b9b2a7;

    --dial:#0b0b0d;
    --dial2:#101014;

    --gold:#c8a45a;
    --gold2:#b18a44;
    --goldHi:#f2dfa8;

    --red:#d14b4b;
    --red2:#ff6b6b;

    --line: rgba(255,255,255,.10);
    --shadow: 0 22px 80px rgba(0,0,0,.65);

    --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
  }

  *{box-sizing:border-box}
  html,body{height:100%}

  body{
    margin:0;
    font-family:var(--sans);
    color:var(--text);
    background:
url("./store-bg.PNG") center/cover no-repeat fixed;
  }

  .wrap{max-width:1200px;margin:0 auto;padding:18px}
  .card{
background: transparent;
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:14px 16px;
background: rgba(0,0,0,.95);
    border-bottom:1px solid rgba(255,255,255,.10);
  }
  .brand{display:flex;align-items:center;gap:12px;min-width:260px}
  .brand img{height:34px;width:auto;filter:brightness(1.08)}
  .brand .t{font-weight:1000;letter-spacing:.7px;text-transform:uppercase;font-size:13px}
  .brand .s{color:var(--muted);font-size:12.5px;margin-top:2px}

  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
  .pill{
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: var(--muted);
    padding:8px 12px;border-radius:999px;font-size:13px;
  }
  .pill b{color:var(--text)}
  .dot{width:10px;height:10px;border-radius:999px;background:var(--muted)}
  .dot.gold{background:var(--gold)}
  .dot.good{background:#2db37a}
  .dot.warn{background:#d6a14a}
  .dot.bad{background:#d14b4b}

  .btn{
    cursor:pointer;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: var(--text);
    border-radius: 14px;
    padding: 10px 14px;
    font-weight: 1000;
    font-size: 13px;
    user-select:none;
    text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn:hover{filter:brightness(1.08);border-color:rgba(200,164,90,.40)}
  .btn.primary{
    background: linear-gradient(180deg, rgba(200,164,90,.95), rgba(177,138,68,.92));
    border-color: rgba(200,164,90,.65);
    color:#0b0b0c;
  }

  .controls{
    padding:14px 16px;
    display:grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap:12px;
  }
  @media (max-width: 980px){ .controls{grid-template-columns:1fr} }

.field label{
  display:inline-block;   /* important for box */

  font-size:16px;
  font-weight:1000;

  color:#ffd700;   /* bright gold */

  /* thin dark border */
  -webkit-text-stroke: 0.6px #000;

  /* clean edge */
  text-shadow:
    0 1px 1px rgba(0,0,0,.9);

  /* 🔥 SMALL BLACK BOX */
  background: rgba(0,0,0,.65);
  padding:4px 10px;
  border-radius:8px;

  /* subtle gold border */
  border:1px solid rgba(255,215,0,.4);

  margin-bottom:6px;
}  input,select{
    width:100%;
    padding:12px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.25);
    color: var(--text);
    outline:none;
    font-size:14px;
  }
  input:focus,select:focus{
    border-color: rgba(200,164,90,.60);
    box-shadow: 0 0 0 4px rgba(200,164,90,.18);
  }

  .stage{padding:18px 18px 22px}
  .watchWrap{
    position:relative;
    width:min(980px, 100%);
    margin: 0 auto;
    aspect-ratio: 1 / 1;
  }
  .watchSvg{position:absolute; inset:0; width:100%; height:100%; z-index:1}

  .footerStrip{
    display:flex;gap:10px;flex-wrap:wrap;
    justify-content:center;
    margin-top:14px;
    color:rgba(245,241,234,.82);
    font-family:var(--mono);
    font-size:12.5px;
  }
  .chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;

  /* DARK like top */
  background: rgba(0,0,0,.75);

  /* gold border */
  border:1px solid rgba(200,164,90,.5);

  /* GOLD TEXT */
  color:#f2dfa8;
  font-weight:800;

  backdrop-filter: blur(6px);
}
<script>
(function lockNav(){

}

<script>
/** must match sheet.html */
const ROOT = "fossil_weekly_v2";
function weekKey(year, week){ return `${ROOT}::${year}::${week}`; }
function loadAll(){ try { return JSON.parse(localStorage.getItem(ROOT) || "{}"); } catch { return {}; } }
function getWeekData(year, week){ return loadAll()[weekKey(year,week)] || null; }

function fmt1(n){ return (Number(n)||0).toFixed(1); }
function fmtInt(n){ return String(Math.round(Number(n)||0)); }
function pct(a,b){ return b ? (a/b)*100 : 0; }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

const MAX_DIAL = 12;

const inYear = document.getElementById("inYear");
const inWeek = document.getElementById("inWeek");
const inGoal = document.getElementById("inGoal");

const uiGoal = document.getElementById("uiGoal");
const uiStatus = document.getElementById("uiStatus");
const uiStatusDot = document.getElementById("uiStatusDot");

function onlyDec(el){
  el.addEventListener("input", ()=>{ el.value = el.value.replace(/[^\d.]/g,"").replace(/(\..*)\./g,"$1"); });
  el.addEventListener("focus", ()=>el.select());
}
onlyDec(inGoal);

function buildYearWeek(){
  const nowY = new Date().getFullYear();
  const years = [nowY-1, nowY, nowY+1, nowY+2];
  inYear.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join("");
  const weeks = Array.from({length:60}, (_,i)=>i+1);
  inWeek.innerHTML = weeks.map(w=>`<option value="${w}">${w}</option>`).join("");
}

function pctToDeg(p){
  if(p <= 0) return 0;
  return p * 30;   // 1% = 30°
}

function buildIndices(){
  const g = document.getElementById("indices");
  if(!g || g.dataset.built === "1") return;
  g.dataset.built = "1";

  const cx=500, cy=520;
  const rOuter=318;
  const rInnerThin=300;
  const rInnerThick=286;

  let s = "";
  for(let i=0;i<60;i++){
    const a = (i/60)*Math.PI*2 - Math.PI/2;
    const x1 = cx + Math.cos(a)*rOuter;
    const y1 = cy + Math.sin(a)*rOuter;

    const thick = (i%5===0);
    const x2 = cx + Math.cos(a)*(thick ? rInnerThick : rInnerThin);
    const y2 = cy + Math.sin(a)*(thick ? rInnerThick : rInnerThin);

    s += `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}"
              stroke-width="${thick?8:3}" opacity="${thick?0.95:0.62}"></line>`;
  }
  g.innerHTML = s;
}

function buildNumbers(){
  const g = document.getElementById("numbers");
  if(!g || g.dataset.built === "1") return;
  g.dataset.built = "1";

  const cx=500, cy=520;
  const r=255;

  let s = "";
  for(let n=1;n<=12;n++){
    const deg = (n/12)*360;
    const a = (deg*Math.PI/180) - Math.PI/2;
    const x = cx + Math.cos(a)*r;
    const y = cy + Math.sin(a)*r;

    const isSix = (n===6);
    s += `
      <text x="${x.toFixed(2)}" y="${(y+10).toFixed(2)}"
            text-anchor="middle"
            font-family="ui-monospace, Menlo, Consolas, monospace"
            font-size="${isSix?40:30}"
            font-weight="${isSix?1200:900}"
            fill="${isSix ? 'rgba(255,107,107,.98)' : 'rgba(200,164,90,.86)'}">
        ${n}
      </text>
    `;
  }
  g.innerHTML = s;
}

function arcPath(cx, cy, r, startDeg, endDeg){
  const toRad = d => (d*Math.PI/180);
  const s = toRad(startDeg-90);
  const e = toRad(endDeg-90);
  const x1 = cx + Math.cos(s)*r, y1 = cy + Math.sin(s)*r;
  const x2 = cx + Math.cos(e)*r, y2 = cy + Math.sin(e)*r;
  const large = (endDeg-startDeg) % 360 > 180 ? 1 : 0;
  return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}

function renderDial({traffic,outreach,replies,weeklyPct,goalPct}){
  uiGoal.textContent = `${fmt1(goalPct)}%`;

  const status = weeklyPct >= goalPct ? "On Track" : (weeklyPct >= goalPct*0.8 ? "Close" : "Behind");
  uiStatus.textContent = status;
  uiStatusDot.className = "dot " + (status==="On Track" ? "good" : status==="Close" ? "warn" : "bad");

  // needle
  const deg = pctToDeg(weeklyPct);
  document.getElementById("hands").setAttribute("transform", `rotate(${deg} 500 520)`);

  // goal ABOVE/BELOW
  document.getElementById("goalStateTxt").textContent = (weeklyPct - goalPct >= 0) ? "ABOVE" : "BELOW";

  // goal arc
  const ratio = goalPct ? clamp(weeklyPct/goalPct, 0, 1.6) : 0;
  const sweep = clamp(ratio,0,1) * 300;
  document.getElementById("goalArc").setAttribute("d", arcPath(380,690,86, 120, 120+sweep));

  // insights
  document.getElementById("insLine1").textContent = `Traffic ${fmtInt(traffic)}`;
  document.getElementById("insLine2").textContent = `Replies ${fmtInt(replies)}`;

  // red arc based on outreach volume
  const outSweep = clamp(outreach/200, 0, 1) * 300;
  document.getElementById("insArc").setAttribute("d", arcPath(620,690,86, 120, 120+outSweep));

  // footer
  document.getElementById("uiOutChip").textContent = `Outreach ${fmtInt(outreach)}`;
  document.getElementById("uiTraChip").textContent = `Traffic ${fmtInt(traffic)}`;
  document.getElementById("uiRepChip").textContent = `Replies ${fmtInt(replies)}`;
}

function loadJourney(){
  const year = Number(inYear.value);
  const week = Number(inWeek.value);
  const manualGoal = Number((inGoal.value||"6.4").replace(/[^\d.]/g,"")) || 6.4;

  const data = getWeekData(year, week);
  const nums = (data?.numbers || []);

  const traffic = nums.reduce((s,n)=>s+(Number(n.traffic)||0),0);
  const outreach = nums.reduce((s,n)=>s+(Number(n.outreach)||0),0);
  const replies = nums.reduce((s,n)=>s+(Number(n.resp)||0),0);

  const weeklyPct = pct(outreach, traffic);
  const goalPct = (data?.goal ?? manualGoal) || manualGoal;
  inGoal.value = String(goalPct);

  document.getElementById("uiWeekChip").textContent = `Week ${week} (${year})`;
  renderDial({traffic,outreach,replies,weeklyPct,goalPct});
}

function init(){
  buildYearWeek();
  buildIndices();
  buildNumbers();
  const now = new Date();
  inYear.value = String(now.getFullYear());
  inWeek.value = "4";
  loadJourney();
}

document.addEventListener("DOMContentLoaded", init);
document.getElementById("btnRefresh").addEventListener("click", loadJourney);
inYear.addEventListener("change", loadJourney);
inWeek.addEventListener("change", loadJourney);
inGoal.addEventListener("input", loadJourney);
window.addEventListener("focus", loadJourney);
setInterval(loadJourney, 500);
</script>

(function lockNav(){
  const nav = document.getElementById("nav");
  if(!nav) return;
  nav.querySelectorAll("a.btn").forEach(a => a.setAttribute("target","_self"));
})();
</script>
