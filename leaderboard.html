<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Weekly Outreach — Leaderboard (Page 3)</title>

<style>
  :root{
    --text:#f5f1ea;
    --muted:#c8c1b6;

    --brass:#c8a45a;
    --good:#2db37a;
    --warn:#d6a14a;
    --bad:#d14b4b;

    --line: rgba(255,255,255,.12);
    --shadow: 0 20px 70px rgba(0,0,0,.60);
    --r:18px;
    --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:var(--sans);
    color:var(--text);
    background:
      linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.72)),
      url("./store-bg.PNG") center/cover no-repeat fixed;
  }

  .wrap{max-width:1300px;margin:0 auto;padding:18px}
  .card{
    background: rgba(18,18,22,.82);
    border:1px solid var(--line);
    border-radius:var(--r);
    box-shadow:var(--shadow);
    min-height: calc(100dvh - 36px);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:14px 16px;
    background: rgba(0,0,0,.18);
    border-bottom:1px solid rgba(255,255,255,.10);
  }
  .brand{display:flex;align-items:center;gap:12px}
  .brand img{height:34px;width:auto;filter:brightness(1.08)}
  .brand .t{font-weight:1000;letter-spacing:.7px;text-transform:uppercase;font-size:13px}
  .brand .s{color:var(--muted);font-size:12.5px;margin-top:2px}

  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}

  .btn{
    cursor:pointer;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(255,255,255,.06);
    color: var(--text);
    border-radius: 14px;
    padding: 10px 14px;
    font-weight: 1000;
    font-size: 13px;
    user-select:none;
    text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
    white-space:nowrap;
  }
  .btn:hover{filter:brightness(1.08);border-color:rgba(200,164,90,.40)}
  .btn.primary{
    background: linear-gradient(180deg, rgba(200,164,90,.96), rgba(177,138,68,.92));
    border-color: rgba(200,164,90,.65);
    color:#0b0b0c;
  }
  .btn.active{
    border-color: rgba(200,164,90,.55);
    box-shadow: 0 0 0 4px rgba(200,164,90,.14);
  }

  .content{
    padding:16px;
    flex:1;
    overflow:auto;
    display:flex;
    justify-content:center;
  }

  /* ✅ CENTERED BIG LAYOUT */
  .center{
    width:min(1180px, 100%);
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .controls{
    display:grid;
    grid-template-columns: 220px 220px 1fr auto;
    gap:12px;
    align-items:end;
    padding:14px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.20);
    box-shadow: 0 18px 55px rgba(0,0,0,.22);
  }
  @media (max-width: 980px){ .controls{grid-template-columns:1fr 1fr;} }
  @media (max-width: 640px){ .controls{grid-template-columns:1fr;} }

  .field label{display:block;color:var(--muted);font-size:12px;margin-bottom:6px;font-weight:900}
  select{
    width:100%;
    padding:12px 12px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.14);
    background: rgba(0,0,0,.25);
    color: var(--text);
    outline:none;
    font-size:14px;
  }
  select:focus{
    border-color: rgba(200,164,90,.60);
    box-shadow: 0 0 0 4px rgba(200,164,90,.18);
  }

  /* ✅ INSIGHTS (Outreach% + Engagement%) */
  .insights{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  @media (max-width: 820px){ .insights{grid-template-columns:1fr;} }

  .insCard{
    border-radius:18px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    padding:14px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 18px 55px rgba(0,0,0,.22);
  }
  .insCard::before{
    content:"";
    position:absolute; inset:-40% -40%;
    background:
      radial-gradient(circle at 25% 25%, rgba(200,164,90,.32), transparent 58%),
      radial-gradient(circle at 75% 75%, rgba(45,179,122,.20), transparent 58%);
    transform: rotate(8deg);
    pointer-events:none;
  }
  .insTop{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    position:relative; z-index:1;
  }
  .insTop .lab{
    text-transform:uppercase;
    letter-spacing:.5px;
    font-weight:1000;
    font-size:12px;
    color:rgba(245,241,234,.80);
  }
  .insTop .meta{
    font-family:var(--mono);
    font-size:12px;
    color:rgba(245,241,234,.70);
    white-space:nowrap;
  }
  .insVal{
    margin-top:10px;
    font-size:54px;
    font-weight:1200;
    font-family:var(--mono);
    position:relative; z-index:1;
    line-height:1;
  }
  .insSub{
    margin-top:10px;
    font-family:var(--mono);
    font-size:12.5px;
    color:rgba(245,241,234,.78);
    position:relative; z-index:1;
  }

  /* ✅ PODIUM FULL WIDTH + BIG */
  .panel{
    border-radius:18px;
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.20);
    box-shadow: 0 18px 55px rgba(0,0,0,.22);
    overflow:hidden;
  }
  .panelHead{
    padding:14px 14px 10px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    border-bottom:1px solid rgba(255,255,255,.08);
    background: rgba(0,0,0,.14);
  }
  .panelHead h2{
    margin:0;
    font-size:14px;
    letter-spacing:.4px;
    text-transform:uppercase;
  }
  .panelHead .meta{
    font-family:var(--mono);
    font-size:12px;
    color:rgba(245,241,234,.75);
    white-space:nowrap;
  }
  .panelBody{padding:16px;}

  .podium{
    display:grid;
    grid-template-columns: 1fr 1.25fr 1fr; /* 2 - 1 - 3 */
    gap:16px;
    align-items:end;
    min-height: 460px;
  }
  @media (max-width: 820px){
    .podium{grid-template-columns:1fr; align-items:stretch; min-height:unset;}
  }

  .pod{
    position:relative;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    overflow:hidden;
    padding:18px 16px 16px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    box-shadow: 0 18px 55px rgba(0,0,0,.35);
  }
  .pod::before{
    content:"";
    position:absolute; inset:-45% -45%;
    background:
      radial-gradient(circle at 25% 25%, rgba(200,164,90,.28), transparent 58%),
      radial-gradient(circle at 75% 75%, rgba(255,255,255,.12), transparent 58%);
    transform: rotate(10deg);
    pointer-events:none;
  }

  /* ✅ BIGGER BADGES CENTER */
  .rank{
    position:absolute;
    top:14px; left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    z-index:2;
  }
  .badge{
    width:76px;height:76px;border-radius:22px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.18);
    background: rgba(0,0,0,.22);
    font-size:36px;
    box-shadow: 0 14px 30px rgba(0,0,0,.45);
  }
  .rankNum{
    font-family:var(--mono);
    font-size:13px;
    font-weight:1100;
    color:rgba(245,241,234,.90);
  }

  .name{
    z-index:1;
    line-height:1.08;
    font-weight:1200;
    letter-spacing:.15px;
    text-shadow: 0 12px 30px rgba(0,0,0,.45);
    padding-top:96px;
    word-break:break-word;
  }
  .pod.p1 .name{font-size:54px;}
  .pod.p2 .name{font-size:44px;}
  .pod.p3 .name{font-size:42px;}

  .sub{
    z-index:1;
    font-family:var(--mono);
    color:rgba(245,241,234,.78);
    font-size:13px;
    margin-top:8px;
  }

  .pod.p2{height: 70%;}
  .pod.p1{height: 96%; border-color: rgba(200,164,90,.52);}
  .pod.p3{height: 62%;}

  .pod.p1 .badge{border-color: rgba(200,164,90,.60); background: rgba(200,164,90,.22);}
  .pod.p1{background: linear-gradient(180deg, rgba(200,164,90,.14), rgba(255,255,255,.05));}

  /* ✅ YEAR LIST (NOT blank anymore) */
  .yearList{
    margin-top:12px;
    display:grid;
    grid-template-columns: 1fr;
    gap:10px;
  }
  .row{
    border:1px solid rgba(255,255,255,.10);
    background: rgba(0,0,0,.18);
    border-radius:16px;
    padding:12px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .row .left{display:flex;align-items:center;gap:10px;min-width:0;}
  .row .icon{
    width:42px;height:42px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.06);
    font-size:18px;
  }
  .row .who{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .row .who b{
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .row .who span{
    font-family:var(--mono);
    font-size:12px;
    color:rgba(245,241,234,.72);
  }
  .row .wins{font-family:var(--mono);font-weight:1200;white-space:nowrap;font-size:14px;}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">

    <div class="topbar">
      <div class="brand">
        <img src="./fossil-logo.PNG" alt="Fossil" />
        <div>
          <div class="t">Weekly Outreach — Leaderboard</div>
          <div class="s">Page 3</div>
        </div>
      </div>

<div class="actions" id="nav">
  <a class="btn" href="./index.html">Page 1</a>
  <a class="btn" href="./sheet.html">Page 2</a>
  <a class="btn primary active" href="./leaderboard.html">Page 3</a>
  <a class="btn" href="./email.html">Page 4</a>
  <a class="btn" href="./print.html">Print</a>
</div>    </div>

    <div class="content">
      <div class="center">

        <div class="controls">
          <div class="field">
            <label>Year</label>
            <select id="inYear"></select>
          </div>
          <div class="field">
            <label>Week</label>
            <select id="inWeek"></select>
          </div>
          <div></div>
          <button class="btn" id="btnRefresh">Refresh</button>
        </div>

        <div class="insights">
          <div class="insCard">
            <div class="insTop">
              <div class="lab">Weekly Outreach %</div>
              <div class="meta" id="insWeekMeta1">—</div>
            </div>
            <div class="insVal" id="insOutreachPct">0.0%</div>
            <div class="insSub" id="insOutreachSub">Traffic 0 • Outreach 0</div>
          </div>

          <div class="insCard">
            <div class="insTop">
              <div class="lab">Engagement %</div>
              <div class="meta" id="insWeekMeta2">—</div>
            </div>
            <div class="insVal" id="insEngPct">0.0%</div>
            <div class="insSub" id="insEngSub">Replies 0 • Outreach 0</div>
          </div>
        </div>

        <div class="panel">
          <div class="panelHead">
            <h2>This Week Winners</h2>
            <div class="meta" id="wkMeta">—</div>
          </div>
          <div class="panelBody">

            <div class="podium">
              <div class="pod p2">
                <div class="rank">
                  <div class="badge">🥈</div>
                  <div class="rankNum">#2</div>
                </div>
                <div class="name" id="w2Name">—</div>
                <div class="sub">Runner-up</div>
              </div>

              <div class="pod p1">
                <div class="rank">
                  <div class="badge">🏆</div>
                  <div class="rankNum">#1</div>
                </div>
                <div class="name" id="w1Name">—</div>
                <div class="sub">Winner</div>
              </div>

              <div class="pod p3">
                <div class="rank">
                  <div class="badge">🥉</div>
                  <div class="rankNum">#3</div>
                </div>
                <div class="name" id="w3Name">—</div>
                <div class="sub">3rd place</div>
              </div>
            </div>

            <div class="yearList" id="yearList"></div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
/* MUST match Page 1 + Page 2 */
const ROOT = "fossil_weekly_v2";
function weekKey(year, week){ return `${ROOT}::${year}::${week}`; }
function loadAll(){ try { return JSON.parse(localStorage.getItem(ROOT) || "{}"); } catch { return {}; } }
function getWeekData(year, week){ return loadAll()[weekKey(year,week)] || null; }

function cleanName(s){ return String(s||"").trim().replace(/\s+/g," "); }
function fmt1(n){ return (Number(n)||0).toFixed(1); }
function pct(a,b){ return b ? (a/b)*100 : 0; }
function fmtInt(n){ return String(Math.round(Number(n)||0)); }

const inYear = document.getElementById("inYear");
const inWeek = document.getElementById("inWeek");

function buildYearWeek(){
  const nowY = new Date().getFullYear();
  const years = [nowY-1, nowY, nowY+1, nowY+2];
  inYear.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join("");
  const weeks = Array.from({length:60}, (_,i)=>i+1);
  inWeek.innerHTML = weeks.map(w=>`<option value="${w}">${w}</option>`).join("");
}

function totalsFromWeekData(data){
  const nums = (data?.numbers || []);
  const traffic  = nums.reduce((s,n)=>s+(Number(n.traffic)||0),0);
  const outreach = nums.reduce((s,n)=>s+(Number(n.outreach)||0),0);
  const replies  = nums.reduce((s,n)=>s+(Number(n.resp)||0),0);
  return { traffic, outreach, replies };
}

function renderInsights(year, week){
  const data = getWeekData(year, week);
  const {traffic, outreach, replies} = totalsFromWeekData(data);

  const outreachPct = pct(outreach, traffic);
  const engPct = pct(replies, outreach);

  const meta = `Week ${week} • ${year}`;
  document.getElementById("insWeekMeta1").textContent = meta;
  document.getElementById("insWeekMeta2").textContent = meta;

  document.getElementById("insOutreachPct").textContent = `${fmt1(outreachPct)}%`;
  document.getElementById("insOutreachSub").textContent = `Traffic ${fmtInt(traffic)} • Outreach ${fmtInt(outreach)}`;

  document.getElementById("insEngPct").textContent = `${fmt1(engPct)}%`;
  document.getElementById("insEngSub").textContent = `Replies ${fmtInt(replies)} • Outreach ${fmtInt(outreach)}`;
}

function renderWeekWinners(year, week){
  const data = getWeekData(year, week);

  const w1 = cleanName(data?.top1 ?? data?.winner1 ?? data?.contributors?.[0] ?? "");
  const w2 = cleanName(data?.top2 ?? data?.winner2 ?? data?.contributors?.[1] ?? "");
  const w3 = cleanName(data?.top3 ?? data?.winner3 ?? data?.contributors?.[2] ?? "");

  document.getElementById("wkMeta").textContent = `Week ${week} • ${year}`;
  document.getElementById("w1Name").textContent = w1 || "—";
  document.getElementById("w2Name").textContent = w2 || "—";
  document.getElementById("w3Name").textContent = w3 || "—";
}

function renderYearLeaderboard(year){
  const all = loadAll();
  const counts = new Map();

  for(const [k, v] of Object.entries(all)){
    if(!k.startsWith(ROOT + "::")) continue;
    const parts = k.split("::");
    const y = Number(parts[1]);
    const w = Number(parts[2]);
    if(y !== year || !w) continue;

    const name1 = cleanName(v?.top1 ?? v?.winner1 ?? v?.contributors?.[0] ?? "");
    if(name1) counts.set(name1, (counts.get(name1) || 0) + 1);
  }

  const list = Array.from(counts.entries())
    .map(([name, wins]) => ({name, wins}))
    .sort((a,b) => (b.wins - a.wins) || a.name.localeCompare(b.name));

  const host = document.getElementById("yearList");
  host.innerHTML = "";

  if(list.length === 0){
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="left">
        <div class="icon">🗂️</div>
        <div class="who">
          <b>No year data</b>
          <span>Add winners on Page 2</span>
        </div>
      </div>
      <div class="wins">—</div>
    `;
    host.appendChild(row);
    return;
  }

  list.slice(0, 8).forEach((x, i) => {
    const row = document.createElement("div");
    row.className = "row";
    const medal = i===0 ? "🏆" : i===1 ? "🥈" : i===2 ? "🥉" : "👤";
    row.innerHTML = `
      <div class="left">
        <div class="icon">${medal}</div>
        <div class="who">
          <b>${x.name}</b>
          <span>Rank #${i+1}</span>
        </div>
      </div>
      <div class="wins">${x.wins} win${x.wins>1?"s":""}</div>
    `;
    host.appendChild(row);
  });
}

function refresh(){
  const year = Number(inYear.value);
  const week = Number(inWeek.value);
  renderInsights(year, week);
  renderWeekWinners(year, week);
  renderYearLeaderboard(year);
}

function init(){
  buildYearWeek();
  const now = new Date();
  inYear.value = String(now.getFullYear());
  inWeek.value = "4";
  refresh();
}

document.addEventListener("DOMContentLoaded", init);
document.getElementById("btnRefresh").addEventListener("click", refresh);
inYear.addEventListener("change", refresh);
inWeek.addEventListener("change", refresh);
window.addEventListener("focus", refresh);
</script>
<script>
(function lockNav(){
  const nav = document.getElementById("nav");
  if(!nav) return;
  nav.querySelectorAll("a.btn").forEach(a => a.setAttribute("target","_self"));
})();
</script>
</body>
</html>
